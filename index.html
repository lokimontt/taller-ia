<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B1220">
<title>Taller IA · Los Muermos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0B1220;--bg2:#111A2E;--card:#162038;--line:#243154;
    --txt:#F1F5F9;--mut:#94A3B8;--acc:#FACC15;--acc2:#22D3EE;
    --ok:#34D399;--bad:#F87171;--warn:#FB923C;--purple:#A78BFA;
    --r:14px;--rs:8px;
  }
  html,body{height:100%;overflow-x:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;
    min-height:100vh;padding-bottom:90px;
  }
  .top{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;border-bottom:1px solid var(--line);
    background:var(--bg2);position:sticky;top:0;z-index:50;
  }
  .top .brand{font-size:11px;color:var(--mut);letter-spacing:.5px;font-weight:600}
  .top .step{font-size:12px;color:var(--acc);font-weight:700;margin-top:2px}
  .top .points{
    display:flex;align-items:center;gap:6px;
    background:linear-gradient(135deg,#1a2547,#243154);
    border:1px solid var(--acc);border-radius:20px;padding:6px 12px;
    font-weight:800;color:var(--acc);font-size:14px;
  }
  .bar{height:3px;background:var(--line);overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s}

  .wrap{max-width:680px;margin:0 auto;padding:14px}

  h1{font-size:26px;line-height:1.15;margin-bottom:8px;font-weight:800}
  h2{font-size:19px;margin:14px 0 8px;font-weight:700}
  h3{font-size:13px;margin:14px 0 8px;font-weight:700;color:var(--acc2);text-transform:uppercase;letter-spacing:.5px}
  p{color:#CBD5E1;margin-bottom:10px;font-size:14px}
  .hint{font-size:12px;color:var(--mut);line-height:1.5}
  .big{font-size:18px;font-weight:600;line-height:1.4;color:#CBD5E1}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .card.acc{border-color:var(--acc)}
  .card.cyan{border-color:var(--acc2)}
  .card.glow{box-shadow:0 0 0 1px var(--acc2),0 8px 32px rgba(34,211,238,.1)}
  .card.warn{border-color:var(--warn);background:rgba(251,146,60,.05)}

  textarea,input[type=text],select{
    width:100%;background:var(--bg);color:var(--txt);border:1px solid var(--line);
    border-radius:var(--rs);padding:11px 13px;font-size:16px;font-family:inherit;
    outline:none;resize:vertical;
  }
  textarea{min-height:80px}
  textarea:focus,input:focus,select:focus{border-color:var(--acc2)}
  label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 16px;border-radius:var(--rs);border:none;cursor:pointer;
    font-size:15px;font-weight:700;font-family:inherit;
    background:var(--acc);color:#1a1a1a;width:100%;margin-top:8px;
    transition:transform .1s, box-shadow .2s;
  }
  .btn:active{transform:scale(.97)}
  .btn.alt{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .btn.cyan{background:var(--acc2);color:#0a1a22}
  .btn.green{background:var(--ok);color:#0a2418}
  .btn.purple{background:var(--purple);color:#1a0f2e}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto}
  .btn.xs{padding:6px 10px;font-size:12px;width:auto}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn.shine{box-shadow:0 0 16px rgba(250,204,21,.3)}

  .nav{
    position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--line);
    padding:10px 14px;display:flex;gap:8px;z-index:40;
  }
  .nav .btn{margin:0}
  .nav .btn.ghost{flex:0 0 auto;width:auto;padding:13px 14px}
  .nav .btn:not(.ghost){flex:1}

  .opt{
    background:var(--bg);border:2px solid var(--line);border-radius:var(--rs);
    padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;
  }
  .opt:active{transform:scale(.98)}
  .opt.sel{border-color:var(--acc);background:rgba(250,204,21,.08)}
  .opt.ok{border-color:var(--ok);background:rgba(52,211,153,.1)}
  .opt.bad{border-color:var(--bad);background:rgba(248,113,113,.1)}
  .opt .lbl{font-size:11px;color:var(--mut);font-weight:700;margin-bottom:4px;letter-spacing:.5px}
  .opt .txt{font-size:14px;line-height:1.4}

  .pill{display:inline-block;padding:3px 9px;border-radius:20px;background:var(--line);font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--mut)}
  .pill.ok{background:rgba(52,211,153,.18);color:var(--ok)}
  .pill.bad{background:rgba(248,113,113,.18);color:var(--bad)}
  .pill.acc{background:rgba(250,204,21,.18);color:var(--acc)}
  .pill.cyan{background:rgba(34,211,238,.18);color:var(--acc2)}

  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row .btn{flex:1;min-width:100px}

  .menu{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .menu .mi{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:12px;cursor:pointer;transition:all .15s;
  }
  .menu .mi:active{transform:scale(.97)}
  .menu .mi.done{border-color:var(--ok)}
  .menu .mi .num{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1px;margin-bottom:5px}
  .menu .mi .t{font-size:13px;font-weight:700;line-height:1.3}
  .menu .mi .s{font-size:11px;color:var(--mut);margin-top:3px}
  .menu .mi.done .num{color:var(--ok)}

  .out{
    background:var(--bg);border:1px solid var(--acc2);border-radius:var(--rs);
    padding:14px;margin-top:10px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:13px;line-height:1.6;white-space:pre-wrap;color:#E2E8F0;position:relative;
  }
  .out .cp{position:absolute;top:6px;right:6px;background:var(--acc2);color:#0a1a22;border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}

  .typing::after{content:'▊';color:var(--acc2);animation:blink 1s infinite;margin-left:2px}
  @keyframes blink{50%{opacity:0}}

  .compare{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:520px){.compare{grid-template-columns:1fr 1fr}}
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:12px;display:flex;flex-direction:column}
  .ccard.bad{border-color:var(--bad)}
  .ccard.good{border-color:var(--ok)}
  .ccard .head{font-size:11px;font-weight:800;letter-spacing:.5px;margin-bottom:8px}
  .ccard .prompt{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:10px;font-style:italic;font-size:13px;margin-bottom:8px;color:#CBD5E1}
  .ccard .resp{background:var(--bg);border-radius:6px;padding:10px;font-size:12px;color:#CBD5E1;line-height:1.55;flex:1;min-height:120px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}

  .score{display:flex;justify-content:space-around;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:10px;margin-bottom:12px}
  .score .col{text-align:center;flex:1}
  .score .v{font-size:22px;font-weight:800;color:var(--acc)}
  .score .l{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}

  .confetti{position:fixed;width:8px;height:8px;top:-10px;animation:fall 3s linear forwards;z-index:100;pointer-events:none}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

  .floatup{
    position:fixed;font-size:24px;font-weight:800;color:var(--acc);
    pointer-events:none;animation:floatup 1.5s ease-out forwards;z-index:200;
    text-shadow:0 0 12px rgba(250,204,21,.6);
  }
  @keyframes floatup{
    0%{opacity:0;transform:translateY(0) scale(.5)}
    20%{opacity:1;transform:translateY(-10px) scale(1.2)}
    100%{opacity:0;transform:translateY(-80px) scale(1)}
  }

  .badge{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
    background:linear-gradient(135deg,rgba(250,204,21,.2),rgba(250,204,21,.05));
    border:1px solid var(--acc);border-radius:16px;font-size:11px;font-weight:700;color:var(--acc);
    margin:2px 4px 2px 0;
  }

  .loader{display:inline-flex;gap:4px;align-items:center;color:var(--acc2);font-size:13px}
  .loader::before{content:'';width:10px;height:10px;border:2px solid var(--acc2);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .footer-note{text-align:center;font-size:10px;color:var(--mut);margin-top:18px;padding:0 14px;line-height:1.5}

  @media (max-width:380px){
    h1{font-size:22px}
    .menu{grid-template-columns:1fr}
    .btn{font-size:14px;padding:12px 13px}
  }
</style>
</head>
<body>

<div class="top">
  <div>
    <div class="brand">TALLER IA · LOS MUERMOS</div>
    <div id="stepLabel" class="step">Inicio</div>
  </div>
  <div class="points" id="pointsBox">
    <span>★</span><span id="pointsVal">0</span>
  </div>
</div>
<div class="bar"><i id="progressBar" style="width:0%"></i></div>

<div class="wrap" id="app"></div>

<div class="nav" id="nav" style="display:none">
  <button class="btn ghost" onclick="prevStep()">← Atrás</button>
  <button class="btn" id="nextBtn" onclick="nextStep()">Siguiente →</button>
</div>

<script>
/* ============================================================
   ESTADO
============================================================ */
const STORE_KEY = 'tallerIA_v4';
const DEFAULTS = {
  purpose:'', obstacle:'', time:'', level:'1°-2° medio',
  promptBuilt:'', builderRole:'', builderTask:'', builderCtx:'', builderFmt:'',
  score:0,
  detective:{}, hunts:{},
  usesSel:{}, plan:'',
  commitDo:'', commitDont:'',
  step:'home',
  badges:[]
};
let state = load();
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
    return {...DEFAULTS, ...s};
  }catch(e){ return {...DEFAULTS}; }
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function reset(){
  if(confirm('¿Borrar tu progreso?')){
    localStorage.removeItem(STORE_KEY);
    state = {...DEFAULTS};
    save(); location.reload();
  }
}

/* ============================================================
   PUNTOS Y FEEDBACK
============================================================ */
function addPoints(n, badge){
  state.score += n;
  if(badge && !state.badges.includes(badge)) state.badges.push(badge);
  save();
  document.getElementById('pointsVal').textContent = state.score;
  const el = document.createElement('div');
  el.className = 'floatup';
  el.textContent = '+' + n;
  const box = document.getElementById('pointsBox');
  const r = box.getBoundingClientRect();
  el.style.left = (r.left + r.width/2 - 20) + 'px';
  el.style.top = (r.top + r.height) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1500);
}

/* ============================================================
   RUTEO
============================================================ */
const STEPS = [
  {id:'home',     label:'Inicio'},
  {id:'purpose',  label:'1. Tu propósito'},
  {id:'demo',     label:'2. Antes vs Después'},
  {id:'builder',  label:'3. Constructor'},
  {id:'detective',label:'4. Detective'},
  {id:'hunter',   label:'5. Cazador'},
  {id:'bridge',   label:'6. Tu plan'},
  {id:'commit',   label:'7. Compromiso'},
  {id:'close',    label:'Cierre'}
];
function go(id){ state.step=id; save(); render(); window.scrollTo(0,0); }
function goHome(){ go('home'); }
function curIdx(){ return STEPS.findIndex(s=>s.id===state.step); }
function nextStep(){ const i=curIdx(); if(i<STEPS.length-1) go(STEPS[i+1].id); }
function prevStep(){ const i=curIdx(); if(i>0) go(STEPS[i-1].id); }

/* ============================================================
   UI HELPERS
============================================================ */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyTxt(btn,txt){
  navigator.clipboard.writeText(txt).then(()=>{
    const o=btn.textContent; btn.textContent='✓';
    setTimeout(()=>btn.textContent=o,1200);
  });
}
function confetti(intense=false){
  const colors=['#FACC15','#22D3EE','#34D399','#F87171','#A78BFA'];
  const n = intense?80:40;
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDelay=(Math.random()*0.5)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3500);
  }
}
async function typeOut(el, text, speed=10){
  el.textContent='';
  el.classList.add('typing');
  for(let i=0;i<text.length;i++){
    el.textContent += text[i];
    if(i%3===0) await new Promise(r=>setTimeout(r, speed));
  }
  el.classList.remove('typing');
}

/* ============================================================
   RENDER
============================================================ */
function render(){
  const i = curIdx();
  const st = STEPS[i];
  document.getElementById('stepLabel').textContent = st.label;
  document.getElementById('progressBar').style.width = (i/(STEPS.length-1)*100)+'%';
  document.getElementById('nav').style.display = (state.step==='home'?'none':'flex');
  document.getElementById('pointsVal').textContent = state.score;
  const app = document.getElementById('app');
  app.innerHTML = '';
  const fn = {home:renderHome,purpose:renderPurpose,demo:renderDemo,builder:renderBuilder,detective:renderDetective,hunter:renderHunter,bridge:renderBridge,commit:renderCommit,close:renderClose}[state.step];
  if(fn) fn(app);
}

/* ============================================================
   HOME
============================================================ */
function renderHome(c){
  c.innerHTML = `
    <div class="card glow">
      <h1>IA para lo que <span style="color:var(--acc)">tú quieres</span></h1>
      <p class="big">7 desafíos. Gana puntos. Sale con un plan tuyo.</p>
    </div>

    <div class="score">
      <div class="col"><div class="v">${state.score}</div><div class="l">Puntos</div></div>
      <div class="col"><div class="v">${state.badges.length}</div><div class="l">Logros</div></div>
      <div class="col"><div class="v">${countDone()}/7</div><div class="l">Completados</div></div>
    </div>

    <div class="menu" id="menu"></div>

    <button class="btn shine" onclick="go('purpose')" style="margin-top:14px">${countDone()===0?'Empezar →':'Continuar →'}</button>

    <div class="row" style="margin-top:14px">
      <button class="btn ghost xs" onclick="reset()">Borrar progreso</button>
    </div>
    <p class="footer-note">CESFAM Los Muermos · Saludablemente APS · 2026</p>
  `;
  const done = {
    purpose: !!state.purpose,
    demo:    curIdx()>=2,
    builder: !!state.promptBuilt,
    detective: Object.keys(state.detective).length>0,
    hunter:  Object.keys(state.hunts).length>0,
    bridge:  !!state.plan,
    commit:  !!state.commitDo
  };
  const items = [
    {id:'purpose',n:'01',t:'Tu propósito',s:'Qué quieres lograr'},
    {id:'demo',n:'02',t:'Antes vs Después',s:'Ver la diferencia'},
    {id:'builder',n:'03',t:'Constructor',s:'Arma TU prompt'},
    {id:'detective',n:'04',t:'Detective',s:'5 casos'},
    {id:'hunter',n:'05',t:'Cazador',s:'10 mentiras'},
    {id:'bridge',n:'06',t:'Tu plan',s:'IA + propósito'},
    {id:'commit',n:'07',t:'Compromiso',s:'Lo que vas a hacer'}
  ];
  document.getElementById('menu').innerHTML = items.map(it=>`
    <div class="mi ${done[it.id]?'done':''}" onclick="go('${it.id}')">
      <div class="num">${it.n} ${done[it.id]?'✓':''}</div>
      <div class="t">${it.t}</div>
      <div class="s">${it.s}</div>
    </div>
  `).join('');
}
function countDone(){
  let n=0;
  if(state.purpose) n++;
  if(curIdx()>=2) n++;
  if(state.promptBuilt) n++;
  if(Object.keys(state.detective).length>0) n++;
  if(Object.keys(state.hunts).length>0) n++;
  if(state.plan) n++;
  if(state.commitDo) n++;
  return n;
}

/* ============================================================
   PASO 1 · PROPÓSITO
============================================================ */
function renderPurpose(c){
  c.innerHTML = `
    <div class="card acc">
      <span class="pill acc">PASO 1 · +5 PUNTOS</span>
      <h1 style="margin-top:8px">¿Qué quieres hacer en <span style="color:var(--acc)">6 meses</span> que hoy no sabes?</h1>
      <p>Concreto. Tuyo. No vale "ser mejor estudiante".</p>
    </div>

    <div class="card">
      <p class="hint">Ejemplos para inspirarte (no copies):<br>
      → Pasar inglés con promedio 6+<br>
      → Hacer mi primer cortometraje con el celular<br>
      → Aprender a tocar 3 canciones en guitarra<br>
      → Subir de cinturón en taekwondo<br>
      → Empezar a programar mi primera app</p>
    </div>

    <div class="card glow">
      <label>Mi meta a 6 meses</label>
      <textarea id="purpose" placeholder="Escribe tu meta concreta...">${esc(state.purpose)}</textarea>

      <label style="margin-top:12px">Qué me cuesta o me bloquea hoy</label>
      <textarea id="obstacle" placeholder="Lo que no entiendo, lo que me da lata...">${esc(state.obstacle)}</textarea>

      <label style="margin-top:12px">Tiempo real a la semana</label>
      <input type="text" id="time" placeholder="Ej: 30 min al día" value="${esc(state.time)}">

      <button class="btn" onclick="savePurpose()">Guardar y continuar →</button>
    </div>
  `;
}
function savePurpose(){
  state.purpose  = document.getElementById('purpose').value.trim();
  state.obstacle = document.getElementById('obstacle').value.trim();
  state.time     = document.getElementById('time').value.trim();
  if(!state.purpose){ alert('Escribe tu meta'); return; }
  if(!state._p1Awarded){ addPoints(5,'Propósito definido'); state._p1Awarded=true; }
  save(); nextStep();
}

/* ============================================================
   PASO 2 · DEMO ANTES/DESPUÉS (respuestas plantilla con typing)
============================================================ */
function renderDemo(c){
  const p = state.purpose || 'aprender inglés';
  const vague = `Ayúdame con ${p}`;
  const good = `Actúa como mentor. Quiero ${p} en 6 meses. Hoy me cuesta: ${state.obstacle||'no sé por dónde empezar'}. Tengo ${state.time||'poco tiempo'} a la semana. Dame un plan de 3 acciones concretas para esta semana, en lenguaje simple para estudiante de ${state.level}.`;

  c.innerHTML = `
    <div class="card cyan">
      <span class="pill cyan">PASO 2 · +10 PUNTOS</span>
      <h1 style="margin-top:8px">Ve la diferencia.</h1>
      <p>Mismo objetivo. Dos formas de pedir. Mira qué responde la IA en cada caso.</p>
    </div>

    <div class="compare">
      <div class="ccard bad">
        <div class="head" style="color:var(--bad)">✗ PROMPT VAGO</div>
        <div class="prompt">"${esc(vague)}"</div>
        <div class="resp" id="respVague">Presiona el botón ↓</div>
      </div>
      <div class="ccard good">
        <div class="head" style="color:var(--ok)">✓ PROMPT BUENO</div>
        <div class="prompt">"${esc(good)}"</div>
        <div class="resp" id="respGood">Presiona el botón ↓</div>
      </div>
    </div>

    <button class="btn shine" id="runBtn" onclick="runDemo()" style="margin-top:12px">▶ Mostrar las respuestas</button>

    <div class="card" style="margin-top:14px">
      <h3>¿Qué cambió?</h3>
      <p>Cuatro piezas: <strong style="color:var(--acc)">ROL · TAREA · CONTEXTO · FORMATO</strong>. Lo armas en el paso 3.</p>
    </div>
  `;
}
function buildDemoResponses(){
  const p = state.purpose || 'tu meta';
  const obs = state.obstacle || 'lo que te cuesta';
  const t = state.time || 'el tiempo que tengas';
  // Respuesta VAGA: pregunta de vuelta, genérica, sin foco
  const vague = `Para ayudarte mejor con esto necesito que me cuentes más. ¿Cuál es tu nivel actual? ¿Para qué lo necesitas? ¿Cuánto tiempo le puedes dedicar? Mientras tanto, aquí van algunos consejos generales:

— Sé constante, estudia todos los días un poco.
— Busca recursos en internet, hay muchos gratis.
— Practica lo que vayas aprendiendo.
— No te desanimes, los progresos toman tiempo.
— Pide ayuda cuando lo necesites.

Si me das más contexto puedo darte algo más específico.`;

  // Respuesta BUENA: plan de 3 acciones específicas
  const good = `Vamos directo al plan para esta semana. Tres acciones concretas, ajustadas a "${p}" y a que te cuesta "${obs}".

ACCIÓN 1 — Lunes a miércoles (15 min/día)
Identifica una dificultad específica dentro de lo que te cuesta. No la resuelvas todavía, solo descríbela: ¿qué pasa cuando lo intentas? Anótalo. Esto te da claridad para atacarla.

ACCIÓN 2 — Jueves (30 min)
Busca un recurso confiable (video, app o tutorial) que ataque esa dificultad concreta. Hazlo de principio a fin, sin saltarte partes. Anota una idea clave que rescates.

ACCIÓN 3 — Sábado (45 min)

    <div class="card glow" style="text-align:center;padding:24px 16px">
      <div style="font-size:48px;margin-bottom:6px">🎯</div>
      <h1>Listo.</h1>
      <p class="big" style="margin-top:8px">La IA no reemplaza tu esfuerzo. Lo acelera.</p>
      <div style="margin-top:14px">
        <span class="pill acc" style="font-size:13px;padding:6px 14px">★ ${state.score} puntos · Rango: ${rank}</span>
      </div>
      ${state.badges.length?`<div style="margin-top:10px">${state.badges.map(b=>`<span class="badge">🏆 ${esc(b)}</span>`).join('')}</div>`:''}
    </div>

    <div class="card">
      <h3>Tu resumen</h3>
      <p style="font-size:13px"><strong>Meta:</strong> ${esc(state.purpose||'—')}</p>
      <p style="font-size:13px"><strong>Sí voy a:</strong> ${esc(state.commitDo||'—')}</p>
      <p style="font-size:13px"><strong>No voy a:</strong> ${esc(state.commitDont||'—')}</p>
    </div>

    <div class="card">
      <h3>Para llevarte</h3>
      <p style="font-size:13px">① Saber pedir > saber buscar.</p>
      <p style="font-size:13px">② La IA inventa. Verifica lo importante.</p>
      <p style="font-size:13px">③ No copies lo que no entiendes.</p>
      <p style="font-size:13px">④ Tu propósito manda. La IA solo acompaña.</p>
    </div>

    <button class="btn cyan" onclick="exportAll()">Copiar mi resumen para WhatsApp</button>
    <button class="btn ghost" onclick="reset()" style="margin-top:8px">Empezar otro</button>
  `;
}
function exportAll(){
  const txt = `MI TALLER IA · LOS MUERMOS
Puntaje: ${state.score} pts ${state.badges.length?'· '+state.badges.length+' logros':''}

🎯 Meta a 6 meses: ${state.purpose}
😬 Qué me cuesta: ${state.obstacle}
⏰ Tiempo: ${state.time}

📝 MI PROMPT:
${state.promptBuilt}

📋 MI PLAN:
${state.plan}

🤝 COMPROMISO:
✓ Sí voy a: ${state.commitDo}
✗ No voy a: ${state.commitDont}`;
  navigator.clipboard.writeText(txt).then(()=>alert('Copiado. Pégalo en WhatsApp o tus notas.'));
}

render();
</script>
